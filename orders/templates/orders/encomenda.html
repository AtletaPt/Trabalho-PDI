<!DOCTYPE html>
<html>
<head>
    <title>Confirmar Encomenda</title>
    <style>
        .messages { list-style: none; padding: 0; margin-bottom: 20px; }
        .message { padding: 10px; border-radius: 4px; margin-bottom: 5px; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

    <h1>Confirmar Encomenda</h1>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="message {{ message.tags }}">
            {{ message }}
        </li>
        {% endfor %}
    </ul>
    {% endif %}

    <h2>{{ cabaz.get_name_display }}</h2>
    <p>{{ cabaz.description }}</p>
    <p><strong>Preço:</strong> {{ cabaz.price }}€</p>

    <form method="POST" action="/orders/confirmar/{{ cabaz.id }}/">
        {% csrf_token %}

        <label>Quantidade:</label>
        <input type="number" name="quantity" value="1" min="1">

        <br><br>

        <label>Código Postal (Coimbra):</label><br>
        <input type="text" name="zip_code" placeholder="Ex: 3040-000" pattern="\d{4}-\d{3}" title="Formato: 0000-000" required>
        <br><small>Introduza o CP para calcularmos a zona de entrega.</small>

        <br><br>

        <label>Data de entrega:</label>
        <input type="date" name="delivery_date" min="{{ hoje }}" required>

        <br><br>

        <button type="submit">Confirmar Encomenda</button>
    </form>

    <br>
    <a href="/cabazes/">Voltar</a>

</body>
</html>
