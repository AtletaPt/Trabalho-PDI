<!DOCTYPE html>
<html>
<head>
    <title>CampoDireto</title>
    <style>
        .messages { list-style: none; padding: 0; margin: 20px 0; }
        .message { padding: 15px; border-radius: 4px; margin-bottom: 10px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="message {{ message.tags }}">
            {{ message }}
        </li>
        {% endfor %}
    </ul>
    {% endif %}

    <h1>Bem-vindo ao CampoDireto</h1>

    <p>Produtos frescos diretamente do produtor para sua casa.</p>

    <a href="/cabazes/">
        <button>Ver Cabazes</button>
    </a>

</body>
</html>
