{% extends 'base.html' %} {% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div
    class="max-w-md w-full bg-white p-10 rounded-[20px] shadow-2xl shadow-black/5 border border-gray-100 text-center"
  >
    <h2 class="text-3xl font-bold text-primary mb-2">Criar Conta</h2>
    <p class="text-gray-500 mb-8 font-medium">
      Junte-se à comunidade CampoDireto
    </p>

    <form method="post" class="space-y-4 text-left">
      {% csrf_token %}

      <style>
        form p {
          margin-bottom: 1rem;
        }

        form label {
          display: block;
          font-weight: 700;
          color: #374151;
          margin-bottom: 0.25rem;
          margin-left: 0.25rem;
          font-size: 0.875rem;
        }

        form input {
          width: 100%;
          padding: 0.75rem;
          border-radius: 0.75rem;
          border: 1px solid #e5e7eb;
          outline: none;
          transition: all 0.2s;
          background-color: rgba(249, 250, 251, 0.5);
        }

        form input:focus {
          border-color: var(--secondary, #10b981);
          box-shadow: 0 0 0 2px var(--secondary, #10b981);
        }

        .helptext {
          display: block;
          font-size: 0.75rem;
          color: #9ca3af;
          margin-top: 0.25rem;
          margin-left: 0.25rem;
        }

        form ul {
          font-size: 0.75rem;
          color: #9ca3af;
          list-style-type: disc;
          padding-left: 1.25rem;
          margin-top: 0.5rem;
        }

        .errorlist {
          color: #ef4444;
          font-size: 0.75rem;
          font-weight: 700;
          margin-bottom: 0.5rem;
          list-style: none;
          padding-left: 0;
        }
      </style>

      {{ form.as_p }}

      <button
        type="submit"
        class="w-full bg-secondary hover:bg-primary text-white font-bold py-4 rounded-2xl text-lg shadow-lg shadow-secondary/20 transition-all transform hover:-translate-y-0.5 active:scale-95 mt-6"
      >
        Registar Conta
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-gray-100">
      <p class="text-gray-500 text-sm">
        Já tem uma conta? <br />
        <a
          href="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}"
          class="text-secondary font-bold hover:text-primary transition-colors inline-block mt-2"
        >
          Faça Login aqui
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
