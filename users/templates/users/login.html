{% extends 'base.html' %} {% load static %} {% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div
    class="max-w-md w-full bg-white p-10 rounded-[20px] shadow-2xl shadow-black/5 border border-gray-100 text-center"
  >
    <img
      src="{% static 'images/logo.png' %}"
      alt="Logo"
      class="h-24 mx-auto mb-6 object-contain"
    />

    <h2 class="text-3xl font-bold text-primary mb-2">Bem-vindo de volta</h2>
    <p class="text-gray-500 mb-8 font-medium">
      Entre para gerir as suas encomendas
    </p>

    <form method="post" class="space-y-6 text-left">
      {% csrf_token %}

      <div>
        <label class="block font-bold text-gray-700 mb-2 ml-1 text-sm"
          >Nome de Utilizador</label
        >
        <input
          type="text"
          name="username"
          required
          class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all bg-gray-50/50"
          placeholder="O seu utilizador"
        />
      </div>

      <div>
        <label class="block font-bold text-gray-700 mb-2 ml-1 text-sm"
          >Palavra-passe</label
        >
        <input
          type="password"
          name="password"
          required
          class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all bg-gray-50/50"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-secondary hover:bg-primary text-white font-bold py-4 rounded-2xl text-lg shadow-lg shadow-secondary/20 transition-all transform hover:-translate-y-0.5 active:scale-95 mt-2"
      >
        Iniciar Sessão
      </button>
    </form>

    <div class="mt-8 pt-6 border-t border-gray-100">
      <p class="text-gray-500 text-sm">
        Ainda não tem conta no CampoDireto? <br />
        <a
          href="/users/registo/"
          class="text-secondary font-bold hover:text-primary transition-colors inline-block mt-2"
        >
          Registe-se agora
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
